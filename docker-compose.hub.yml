# ============================================================
# Same stack as docker-compose.yml but pulls pre-built images
# from Docker Hub (no local `build:`). Set DOCKERHUB_USER first.
#
#   export DOCKERHUB_USER=isammalik   # your Docker Hub username
#   docker compose -f docker-compose.hub.yml pull
#   docker compose -f docker-compose.hub.yml up
#
# Images must be public on Docker Hub for anonymous `docker pull`, or you must
# `docker login` first for private repos.
# ============================================================

services:

  ml:
    image: ${DOCKERHUB_USER:?Set DOCKERHUB_USER to your Docker Hub username}/product-price-predictor-ml-api:latest
    container_name: price_predictor_ml
    restart: unless-stopped
    ports:
      - "${ML_PORT:-5001}:5001"
    volumes:
      - ./ml:/app
      - ml_models:/app/models
      - ml_data:/app/data
    env_file:
      - .env.example
    environment:
      ML_PORT: "${ML_PORT:-5001}"
      PYTHONUNBUFFERED: "1"
      KAGGLE_USERNAME: "${KAGGLE_USERNAME:-}"
      KAGGLE_KEY: "${KAGGLE_KEY:-}"
    command: >
      sh -c "
        python download_data.py &&
        python preprocess.py   &&
        python train.py        &&
        python predict_service.py
      "
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  web:
    image: ${DOCKERHUB_USER:?Set DOCKERHUB_USER to your Docker Hub username}/product-price-predictor-rails-app:latest
    container_name: price_predictor_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      ml:
        condition: service_healthy
    environment:
      RAILS_ENV: "production"
      ML_SERVICE_URL: "http://ml:${ML_PORT:-5001}"
      RAILS_MASTER_KEY: "${RAILS_MASTER_KEY}"
      RAILS_LOG_TO_STDOUT: "true"
    volumes:
      - rails_storage:/rails/storage
      - rails_log:/rails/log
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ml_models:
    driver: local
  ml_data:
    driver: local
  rails_storage:
    driver: local
  rails_log:
    driver: local
